name: code-scanning

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "23 4 * * 1"

permissions:
  contents: read
  security-events: write
  pull-requests: read

jobs:
  # Our own scanner, exported as SARIF to GitHub's Security tab.
  claude-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Scan
        continue-on-error: true
        run: |
          node dist/bin/cli.js scan . > scan-summary.json || true
          cat scan-summary.json
      - name: Export SARIF
        run: node dist/bin/cli.js sarif . > claude-guard.sarif
      - name: Upload SARIF to GitHub Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: claude-guard.sarif
          category: claude-guard

  # Run GitHub's CodeQL alongside us — we're complementary, not a replacement.
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
      - uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  # Flag dependency upgrades that introduce known-vulnerable versions.
  # Advisory on push, enforce on pull_request via fail-on-severity.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
