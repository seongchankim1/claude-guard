name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: E2E scan against vulnerable example (pinned counts)
        run: |
          node -e "
            import('./dist/scan.js').then(async m => {
              const r = await m.scan('./examples/vulnerable-next-app', { layers: ['l2'], ignore_baseline: true });
              const sev = r.summary_by_severity;
              const expected = { total: 23, CRITICAL: 12, HIGH: 7, MEDIUM: 2, LOW: 2 };
              const mismatches = [];
              if (r.finding_count !== expected.total) mismatches.push('total=' + r.finding_count + ' (want ' + expected.total + ')');
              for (const k of ['CRITICAL','HIGH','MEDIUM','LOW']) {
                if (sev[k] !== expected[k]) mismatches.push(k + '=' + sev[k] + ' (want ' + expected[k] + ')');
              }
              if (mismatches.length) {
                console.error('Demo-app counts drifted: ' + mismatches.join(', '));
                console.error('If the drift is intentional, update .github/workflows/ci.yml and all README files.');
                process.exit(1);
              }
              console.log('OK — ' + r.finding_count + ' findings:', sev);
            });
          "

  rules-inventory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish rule count summary
        run: |
          node -e "
            import('./dist/rules/loader.js').then(m => m.loadBuiltinRules()).then(r => {
              const byCat = {};
              for (const x of r) byCat[x.category] = (byCat[x.category] ?? 0) + 1;
              const lines = ['| category | rules |', '|---|---|'];
              for (const [c, n] of Object.entries(byCat)) lines.push('| ' + c + ' | ' + n + ' |');
              console.log('## Rules inventory (' + r.length + ' total)\\n');
              console.log(lines.join('\\n'));
            });
          " >> $GITHUB_STEP_SUMMARY
