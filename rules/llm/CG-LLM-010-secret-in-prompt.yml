id: CG-LLM-010
title: "Prompt or message body interpolates an env secret directly"
severity: HIGH
category: llm
languages: [javascript, typescript, python]
patterns:
  - regex: "(content|prompt|messages)[^\\n]{0,120}process\\.env\\.[A-Z_]*(SECRET|KEY|TOKEN|PASSWORD|PRIVATE)"
    files:
      - "**/*.ts"
      - "**/*.js"
  - regex: "(content|prompt|messages)[^\\n]{0,120}os\\.environ\\[[\"'][A-Z_]*(SECRET|KEY|TOKEN|PASSWORD|PRIVATE)"
    files:
      - "**/*.py"
context_hint: |
  Putting a secret into the prompt body means the model provider logs
  it, any downstream evaluator sees it, and a sufficiently clever
  prompt injection can echo it back. Never send secrets to the model;
  if the model needs to authenticate a tool, have the tool handler
  pull the secret on the server instead.
fix_strategy: suggest_only
