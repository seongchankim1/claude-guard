id: CG-AUTH-004
title: "Password-like value hashed with MD5 or SHA1"
severity: HIGH
category: auth
patterns:
  - regex: "createHash\\s*\\(\\s*[\"'](md5|sha-?1)[\"']"
    files:
      - "**/*.js"
      - "**/*.ts"
  - regex: "hashlib\\.(md5|sha1)\\s*\\("
    files:
      - "**/*.py"
  - regex: "MessageDigest\\.getInstance\\s*\\(\\s*[\"'](MD5|SHA-?1)[\"']"
    files:
      - "**/*.java"
context_hint: |
  MD5 and SHA1 are broken for authentication use. For passwords, use
  argon2id, bcrypt (cost 12+), or scrypt. For general hashing needs
  where collision resistance matters, use SHA-256 or stronger.
fix_strategy: suggest_only
