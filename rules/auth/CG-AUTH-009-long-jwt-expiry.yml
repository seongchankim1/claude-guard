id: CG-AUTH-009
title: "JWT signed with expiresIn over one day"
severity: MEDIUM
category: auth
languages: [javascript, typescript]
patterns:
  - regex: "expiresIn\\s*:\\s*[\"'][0-9]{2,}[dyw][\"']"
    files:
      - "**/*.ts"
      - "**/*.js"
  - regex: "expiresIn\\s*:\\s*[0-9]{5,}"
    files:
      - "**/*.ts"
      - "**/*.js"
context_hint: |
  Multi-day JWT lifetimes trade off revocability for convenience. Prefer
  short access-token windows (15 minutes) paired with a refresh token
  that is revocable server-side.
fix_strategy: suggest_only
