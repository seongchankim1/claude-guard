id: CG-AUTH-010
title: "Password or token passed as a URL query parameter"
severity: HIGH
category: auth
patterns:
  - regex: "[?&](password|pw|secret|token|api_key)=[^\\s&\"'`]+"
    files:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.py"
      - "**/*.go"
      - "**/*.rb"
context_hint: |
  URL query parameters end up in server logs, referer headers, and
  browser history. Never pass credentials via the query string — use
  the Authorization header or a request body over HTTPS.
fix_strategy: suggest_only
