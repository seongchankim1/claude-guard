id: CG-AUTH-013
title: "Password minLength / length check below 8 characters"
severity: MEDIUM
category: auth
languages: [javascript, typescript, python]
patterns:
  - regex: "(password|passwd|pwd)[^\\n]{0,40}\\.length\\s*[<>]=?\\s*[1-7]\\b"
    files:
      - "**/*.ts"
      - "**/*.js"
      - "**/*.py"
  - regex: "minLength\\s*:\\s*[1-7]\\b[^\\n]{0,40}password"
    files:
      - "**/*.ts"
      - "**/*.js"
context_hint: |
  Minimum password length below 8 is effectively no policy. NIST SP
  800-63B recommends a minimum of 8, with no composition requirements,
  combined with a breach-list check. Bump the minimum and run passwords
  through a known-leaked check before accepting.
fix_strategy: suggest_only
