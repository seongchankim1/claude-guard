id: CG-AUTH-020
title: "Password-reset token built from Math.random().toString(36).slice(2)"
severity: HIGH
category: auth
languages: [javascript, typescript]
patterns:
  - regex: "(reset|token|recovery|verify)[\\w]*\\s*=\\s*Math\\.random\\(\\)\\.toString\\(36\\)"
    files:
      - "**/*.ts"
      - "**/*.js"
context_hint: |
  This idiom yields ~10 base-36 chars of non-cryptographic randomness,
  which is guessable in minutes on a modern laptop. Use
  crypto.randomBytes(32).toString('hex') for any reset / verify /
  one-time token.
fix_strategy: suggest_only
