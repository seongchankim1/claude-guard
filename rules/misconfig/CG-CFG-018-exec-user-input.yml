id: CG-CFG-018
title: "Shell exec / spawn takes a string built from request input"
severity: CRITICAL
category: misconfig
languages: [javascript, typescript]
patterns:
  - regex: "(exec|execSync|spawn|spawnSync)\\s*\\([^)]{0,200}(req|request)\\.(body|query|params)"
    files:
      - "**/*.ts"
      - "**/*.js"
context_hint: |
  Passing request data into exec/spawn is RCE. Either don't shell out,
  or use the array form with a fixed command and argv items validated
  against a strict allowlist.
fix_strategy: suggest_only
