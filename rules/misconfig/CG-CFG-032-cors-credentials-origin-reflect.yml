id: CG-CFG-032
title: "CORS reflects the request Origin with credentials allowed"
severity: HIGH
category: misconfig
languages: [javascript, typescript]
patterns:
  - regex: "Access-Control-Allow-Origin[^\\n]{0,80}req\\.headers\\.origin"
    files:
      - "**/*.ts"
      - "**/*.js"
  - regex: "cors\\s*\\(\\s*\\{\\s*origin\\s*:\\s*true[\\s\\S]{0,120}credentials\\s*:\\s*true"
    files:
      - "**/*.ts"
      - "**/*.js"
context_hint: |
  Reflecting the request Origin header while Allow-Credentials is true
  is functionally equivalent to "*" + credentials — any website can
  read responses. Maintain an explicit origin allowlist and only
  reflect if the origin is in the list.
fix_strategy: suggest_only
