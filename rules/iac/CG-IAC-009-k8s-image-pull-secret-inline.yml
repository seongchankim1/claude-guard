id: CG-IAC-009
title: "Kubernetes Secret with plain-text password / token field"
severity: HIGH
category: iac
patterns:
  - regex: "kind:\\s*Secret[\\s\\S]{0,400}stringData:[\\s\\S]{0,400}(password|token|api_key|apikey|secret):\\s*[\"']?[^\\s*\"']+"
    files:
      - "**/*.yaml"
      - "**/*.yml"
context_hint: |
  Committing a Kubernetes Secret with stringData containing a real
  credential defeats the point of secrets. Use Sealed Secrets, SOPS,
  External Secrets, or deploy the secret out-of-band from the manifest.
fix_strategy: suggest_only
