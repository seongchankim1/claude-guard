id: CG-SEC-002
title: "Hardcoded API key or token literal"
severity: CRITICAL
category: secrets
patterns:
  - regex: "sk-[A-Za-z0-9_-]{20,}"
    files:
      - "**/*.js"
      - "**/*.ts"
      - "**/*.py"
      - "**/*.go"
      - "**/*.rb"
      - "**/*.java"
      - "**/*.php"
      - "**/*.rs"
      - "**/*.kt"
      - "**/*.swift"
      - "**/*.cs"
  - regex: "AIza[0-9A-Za-z_-]{30,}"
    files:
      - "**/*.js"
      - "**/*.ts"
      - "**/*.py"
      - "**/*.go"
      - "**/*.rb"
      - "**/*.java"
      - "**/*.php"
      - "**/*.rs"
      - "**/*.kt"
      - "**/*.swift"
      - "**/*.cs"
  - regex: "ghp_[A-Za-z0-9]{30,}"
    files:
      - "**/*.js"
      - "**/*.ts"
      - "**/*.py"
      - "**/*.go"
      - "**/*.rb"
      - "**/*.java"
      - "**/*.php"
      - "**/*.rs"
context_hint: |
  Literal credentials embedded in source leak via git history, npm tarballs,
  and CI logs. Rotate immediately, then move the secret behind an env var
  or secret manager.
fix_strategy: suggest_only
poc_template: |
  # The secret may still live in git history:
  git log -p --all -S '<LITERAL>'
