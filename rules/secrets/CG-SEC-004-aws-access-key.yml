id: CG-SEC-004
title: "AWS access key ID embedded in source"
severity: CRITICAL
category: secrets
patterns:
  - regex: "AKIA[0-9A-Z]{16}"
    files:
      - "**/*.js"
      - "**/*.ts"
      - "**/*.py"
      - "**/*.go"
      - "**/*.rb"
      - "**/*.java"
      - "**/*.php"
      - "**/*.rs"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.env*"
context_hint: |
  AWS access key IDs follow AKIA* in production or ASIA* for session
  tokens. If this is a real key, rotate it immediately via the IAM
  console, scrub git history, and move it behind AWS Secrets Manager or
  Parameter Store.
fix_strategy: suggest_only
poc_template: |
  # Check CloudTrail for unauthorized use since the leak date.
