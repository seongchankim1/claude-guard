id: CG-SEC-011
title: "kubeconfig / cluster-admin token committed"
severity: CRITICAL
category: secrets
patterns:
  - regex: "kind:\\s*Config\\b[\\s\\S]{0,2000}(client-certificate-data|client-key-data|token):"
    files:
      - "**/*.yaml"
      - "**/*.yml"
      - "**/kubeconfig"
context_hint: |
  A committed kubeconfig with embedded client cert/key or bearer token
  is cluster-admin-in-git. Rotate the cert/token in the cluster, remove
  from history, and distribute credentials via short-lived OIDC or
  sealed-secrets instead.
fix_strategy: suggest_only
