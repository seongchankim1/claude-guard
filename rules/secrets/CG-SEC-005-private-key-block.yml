id: CG-SEC-005
title: "Private key material embedded in source"
severity: CRITICAL
category: secrets
patterns:
  - regex: "-----BEGIN (RSA |EC |DSA |OPENSSH |PGP )?PRIVATE KEY"
    files:
      - "**/*.js"
      - "**/*.ts"
      - "**/*.py"
      - "**/*.go"
      - "**/*.java"
      - "**/*.rb"
      - "**/*.env*"
      - "**/*.pem"
      - "**/*.key"
context_hint: |
  Private keys in source are a guaranteed leak via git, CI logs, and npm
  tarballs. Generate a new key pair, distribute the new public key, and
  retire the leaked one.
fix_strategy: suggest_only
