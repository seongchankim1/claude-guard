id: CG-SEC-001
title: "NEXT_PUBLIC_* env var appears to hold a secret"
severity: CRITICAL
category: secrets
languages: [javascript, typescript]
patterns:
  - regex: "NEXT_PUBLIC_[A-Z_]*(SECRET|KEY|TOKEN|PASSWORD|PRIVATE)"
    files:
      - ".env*"
      - "**/*.js"
      - "**/*.ts"
      - "**/*.jsx"
      - "**/*.tsx"
      - "**/*.mjs"
      - "**/*.cjs"
context_hint: |
  NEXT_PUBLIC_ prefixed variables are inlined into the client bundle.
  A name like *_SECRET / *_KEY / *_TOKEN / *_PASSWORD suggests a credential
  that must never reach the browser. Rename without the NEXT_PUBLIC_ prefix
  and access it only from server code.
fix_strategy: rename_env_var
poc_template: |
  # Verify exposure in the client bundle:
  curl -s <APP_URL>/_next/static/chunks/ | grep -i '<ENV_NAME>'
