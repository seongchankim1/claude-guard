id: CG-SEC-003
title: "Supabase service_role key used where it may reach the client"
severity: CRITICAL
category: secrets
languages: [javascript, typescript]
patterns:
  - regex: "createClient\\s*\\([^)]*(SUPABASE_SERVICE_ROLE|service_role)"
    files:
      - "**/*.js"
      - "**/*.ts"
      - "**/*.jsx"
      - "**/*.tsx"
context_hint: |
  The Supabase service_role key bypasses Row Level Security. It must only
  exist in server code (route handlers, server actions, edge runtime with
  "server-only" import). Any client-reachable module that references it is
  a full database compromise waiting to happen.
fix_strategy: suggest_only
poc_template: |
  # Full RLS bypass if the key leaks to the browser:
  curl <APP_URL>/api/<route>  # returns data that should require auth
