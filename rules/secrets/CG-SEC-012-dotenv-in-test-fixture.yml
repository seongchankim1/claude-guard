id: CG-SEC-012
title: "Test fixture / snapshot file contains live-looking credential"
severity: HIGH
category: secrets
patterns:
  - regex: "(sk-[A-Za-z0-9_-]{20,}|AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{30,}|xoxb-[0-9A-Za-z-]{20,})"
    files:
      - "**/__tests__/**"
      - "**/__snapshots__/**"
      - "**/*.fixture.{ts,js,json}"
      - "**/fixtures/**"
      - "**/test/**"
      - "**/tests/**"
      - "**/spec/**"
context_hint: |
  Tokens and keys that look real should not ship in test fixtures or
  snapshots — they are discoverable via GitHub search and get abused.
  Swap them for obviously fake strings ("sk-test-FAKE", "AKIA" + zeros)
  and regenerate snapshots.
fix_strategy: suggest_only
