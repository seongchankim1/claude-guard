id: CG-SEC-006
title: "Real .env file (not .env.example) present in repo"
severity: HIGH
category: secrets
patterns:
  - regex: "^[A-Z][A-Z0-9_]{2,}\\s*=\\s*[^\\s#].{0,200}$"
    files:
      - ".env"
      - ".env.local"
      - ".env.production"
      - ".env.development"
context_hint: |
  Non-example .env files belong in .gitignore. If this file is committed,
  assume the secrets inside are leaked and rotate them. Use .env.example
  with placeholder values for documentation.
fix_strategy: suggest_only
