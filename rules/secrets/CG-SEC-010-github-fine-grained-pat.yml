id: CG-SEC-010
title: "GitHub fine-grained personal access token in source"
severity: CRITICAL
category: secrets
patterns:
  - regex: "github_pat_[A-Za-z0-9_]{70,}"
    files:
      - "**/*.js"
      - "**/*.ts"
      - "**/*.py"
      - "**/*.go"
      - "**/*.rb"
      - "**/*.env*"
      - "**/*.yml"
      - "**/*.yaml"
context_hint: |
  github_pat_* tokens grant repo or org-level API access. Rotate via
  GitHub settings immediately, scrub git history, and move the token
  to a secret manager. Prefer GitHub App installation tokens for
  automation.
fix_strategy: suggest_only
