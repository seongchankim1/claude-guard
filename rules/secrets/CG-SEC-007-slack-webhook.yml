id: CG-SEC-007
title: "Slack webhook URL embedded in source"
severity: HIGH
category: secrets
patterns:
  - regex: "https://hooks\\.slack\\.com/services/T[A-Z0-9]{8,}/B[A-Z0-9]{8,}/[A-Za-z0-9]{24,}"
    files:
      - "**/*.js"
      - "**/*.ts"
      - "**/*.py"
      - "**/*.go"
      - "**/*.rb"
      - "**/*.env*"
      - "**/*.yml"
      - "**/*.yaml"
context_hint: |
  Slack webhooks can be used by anyone who sees them. Revoke the webhook,
  rotate it, and store the replacement in an env var.
fix_strategy: suggest_only
