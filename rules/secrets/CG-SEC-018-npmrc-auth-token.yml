id: CG-SEC-018
title: "Committed .npmrc with an inline _authToken"
severity: CRITICAL
category: secrets
patterns:
  - regex: "_authToken\\s*=\\s*[A-Za-z0-9_-]{20,}"
    files:
      - "**/.npmrc"
      - "**/.yarnrc"
      - "**/.yarnrc.yml"
context_hint: |
  A real npm token in .npmrc can push packages under your identity.
  Rotate via npm's website, and replace with ${NPM_TOKEN} sourced from
  a secret at CI/deploy time.
fix_strategy: suggest_only
