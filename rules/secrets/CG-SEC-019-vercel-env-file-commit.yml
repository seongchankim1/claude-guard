id: CG-SEC-019
title: ".vercel/.env.development.local or similar committed"
severity: CRITICAL
category: secrets
patterns:
  - regex: "^[A-Z][A-Z0-9_]{2,}\\s*=\\s*\"?[^\\s#\"]{1,200}"
    files:
      - "**/.vercel/.env*"
      - "**/.vercel/output/**/*.env*"
context_hint: |
  Vercel CLI pulls environment variables into .vercel/. Committing that
  directory ships production credentials to your repo. Add `.vercel/`
  to .gitignore; rotate any values that ended up in git history.
fix_strategy: suggest_only
