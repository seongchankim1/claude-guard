id: CG-SEC-016
title: "MongoDB connection string with inline username:password"
severity: CRITICAL
category: secrets
patterns:
  - regex: "mongodb(\\+srv)?:\\/\\/[^:/\"'`\\s]+:[^@\"'`\\s]+@"
    files:
      - "**/*.{js,ts,py,go,rb,java,env,env.*,yml,yaml,json}"
context_hint: |
  mongodb://user:password@... strings leak credentials via source,
  history, and log lines. Use a URI-less driver config that reads the
  username and password from env vars, and template the URI at runtime.
fix_strategy: suggest_only
